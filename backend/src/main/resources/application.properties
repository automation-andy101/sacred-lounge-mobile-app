# Server
server.port=8080
server.servlet.context-path=/api

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/sacred_lounge
spring.datasource.username=postgres
spring.datasource.password=postgres123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
# app.jwt.secret=${JWT_SECRET:change-me-to-a-256-bit-secret-in-production-minimum}
app.jwt.secret=Y2hhbmdlLW1lLXRvLWEtMjU2LWJpdC1zZWNyZXQtaW4tcHJvZHVjdGlvbi1taW5pbXVt
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# AWS S3 (media storage for meditations & images)
aws.s3.bucket=${AWS_S3_BUCKET:sacred-lounge-media}
aws.s3.region=${AWS_REGION:eu-west-2}
aws.access-key=${AWS_ACCESS_KEY:}
aws.secret-key=${AWS_SECRET_KEY:}

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@sacredlounge.co.uk

# Eventbrite Integration
app.eventbrite.base-url=https://www.eventbrite.co.uk/e/

# CORS
# app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:8081}
app.cors.allowed-origins=http://localhost:3000,http://localhost:8081,http://192.168.1.21:8081

# Logging
logging.level.com.sacredlounge=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.security=DEBUG
